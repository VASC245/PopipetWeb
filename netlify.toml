[build]
  command = "npm run build"
  publish = "dist"

# Payphone valida el origen de la redirección al formulario de pago;
# recomienda origin u origin-when-cross-origin para evitar "Acceso denegado".
[[headers]]
  for = "/*"
  [headers.values]
    Referrer-Policy = "origin-when-cross-origin"

[[redirects]]
  from = "https://www.popipet.com/*"
  to = "https://popipet.com/:splat"
  status = 301
  force = true
